services:
  bot:
    build: .
    image: grammar-check-bot
    container_name: grammar-check-bot
    restart: unless-stopped
    mem_limit: 384m
    env_file: .env
    environment:
      # Bind on all interfaces inside the container; the port below only
      # publishes to host loopback, so nginx can reach the IPN webhook.
      WEBHOOK_HOST: "0.0.0.0"
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:${WEBHOOK_PORT:-8092}:${WEBHOOK_PORT:-8092}"
